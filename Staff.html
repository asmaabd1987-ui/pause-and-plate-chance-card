<!doctype html>
<html lang="ar" dir="rtl">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Pause & Plate — Staff</title>

<style>

:root{
--green:#094B2D;
--gold:#D9A51E;
--cream:#F7F1E5;
--ink:#18251b;
}

*{
box-sizing:border-box;
}

body{

margin:0;

min-height:100vh;

background:

radial-gradient(
circle at top,
#ffffff 0%,
var(--cream) 55%,
#e9e0ce 100%
);

color:var(--ink);

font-family:
Arial,
"Noto Sans Arabic",
sans-serif;

}

.wrap{

max-width:650px;

margin:auto;

padding:22px;

}

.card{

background:#fffdf8;

border-radius:30px;

padding:30px 24px;

box-shadow:
0 18px 50px #00000020;

}

.brand{

text-align:center;

color:var(--green);

font-family:Georgia,serif;

font-size:30px;

font-weight:700;

direction:ltr;

margin-bottom:12px;

}

.brand span{

color:var(--gold);

}

h1{

text-align:center;

color:var(--green);

margin:12px 0 8px;

font-size:28px;

}

.subtitle{

text-align:center;

color:#69736a;

line-height:1.8;

margin-bottom:25px;

}

label{

display:block;

font-weight:bold;

margin-bottom:8px;

}

input{

width:100%;

padding:17px;

border:

1px solid #d7ddd4;

border-radius:14px;

font-size:20px;

text-align:center;

direction:ltr;

letter-spacing:2px;

outline:none;

}

input:focus{

border-color:var(--green);

box-shadow:

0 0 0 3px #094b2d18;

}

button{

width:100%;

border:0;

border-radius:999px;

padding:16px;

margin-top:16px;

background:var(--green);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

}

button:disabled{

opacity:.55;

cursor:not-allowed;

}

#result{

display:none;

margin-top:25px;

padding:24px;

border-radius:20px;

text-align:center;

}

.valid{

background:#eef6ec;

border:2px solid #a8c6a3;

}

.already{

background:#fff4df;

border:2px solid #e1b95b;

}

.invalid{

background:#fff0f0;

border:2px solid #d99b9b;

}

.status{

font-size:24px;

font-weight:bold;

margin-bottom:15px;

}

.prize{

background:white;

border-radius:16px;

padding:18px;

margin:16px 0;

font-size:22px;

font-weight:bold;

color:var(--green);

line-height:1.8;

}

.reward-code{

font-family:monospace;

font-size:20px;

font-weight:bold;

letter-spacing:3px;

direction:ltr;

color:var(--green);

}

.confirm{

background:var(--gold);

color:#17351f;

margin-top:20px;

}

.small{

font-size:13px;

color:#69736a;

line-height:1.7;

margin-top:18px;

}

.success-message{

color:var(--green);

font-weight:bold;

margin-top:15px;

}

.error-message{

color:#b00020;

font-weight:bold;

margin-top:15px;

}

</style>

</head>


<body>


<div class="wrap">

<div class="card">


<div class="brand">

PAUSE <span>&amp;</span> PLATE

</div>


<h1>

🎁 التحقق من الجائزة

</h1>


<div class="subtitle">

أدخل كود الجائزة للتحقق منها<br>

<span dir="ltr">

Vérification de la récompense

</span>

</div>


<label>

🔑 كود الجائزة

</label>


<input

id="rewardCode"

type="text"

placeholder="PP-XXXXXXXX"

autocomplete="off"

>


<button id="checkButton">

🔍 التحقق من الجائزة

</button>


<div id="message"></div>


<div id="result">


<div id="status" class="status"></div>


<div class="prize">

<div>

🎁 الجائزة:

</div>


<div id="prizeArabic"></div>


<div

id="prizeFrench"

dir="ltr"

>

</div>

</div>


<div>

كود الجائزة:

</div>


<div

id="displayCode"

class="reward-code"

>

</div>


<button

id="confirmButton"

class="confirm"

>

✅ تأكيد استلام الجائزة

</button>


<div

id="confirmedMessage"

class="success-message"

style="display:none"

>

تم تأكيد استلام الجائزة بنجاح ✅

</div>


</div>


<div class="small">

⚠️ تأكد من الجائزة قبل الضغط على زر تأكيد الاستلام.<br>

بعد التأكيد، لا يمكن استعمال نفس الكود مرة أخرى.

</div>


</div>

</div>


<script type="module">


import {

initializeApp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";


import {

getFirestore,

collection,

query,

where,

getDocs,

doc,

runTransaction,

serverTimestamp

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig={

apiKey:

"AIzaSyCHON3xqMq-Ob-ul1WWB1lY8Qw2UAdUvX8",

authDomain:

"pause-and-plate-chance-card.firebaseapp.com",

projectId:

"pause-and-plate-chance-card",

storageBucket:

"pause-and-plate-chance-card.firebasestorage.app",

messagingSenderId:

"593151678023",

appId:

"1:593151678023:web:71336ac1cb40a51800c362"

};


const app=

initializeApp(firebaseConfig);


const db=

getFirestore(app);


const rewardCodeInput=

document.getElementById(

"rewardCode"

);


const checkButton=

document.getElementById(

"checkButton"

);


const confirmButton=

document.getElementById(

"confirmButton"

);


const result=

document.getElementById(

"result"

);


const status=

document.getElementById(

"status"

);


const prizeArabic=

document.getElementById(

"prizeArabic"

);


const prizeFrench=

document.getElementById(

"prizeFrench"

);


const displayCode=

document.getElementById(

"displayCode"

);


const message=

document.getElementById(

"message"

);


const confirmedMessage=

document.getElementById(

"confirmedMessage"

);


let currentDocumentId=null;


let currentRewardCode=null;


let currentPrize=null;


function showMessage(

text,

type=""

){

message.textContent=text;

message.className=

type==="error"

?

"error-message"

:

"success-message";

}


function clearResult(){

result.style.display="none";

confirmedMessage.style.display="none";

currentDocumentId=null;

currentRewardCode=null;

currentPrize=null;

}


function getPrizeArabic(prize){

const prizes={

"Café au choix":

"قهوة من اختيارك",

"Boisson offerte":

"مشروب مجاني",

"Dessert offert":

"حلوى مجانية",

"Side dish offert":

"طبق جانبي مجاني",

"Pizza offerte":

"بيتزا مجانية",

"-10% sur votre prochaine visite":

"خصم 10% في زيارتك القادمة"

};

return prizes[prize] || prize;

}


checkButton.onclick=

async()=>{


const code=

rewardCodeInput.value

.trim()

.toUpperCase();


if(!code){

showMessage(

"المرجو إدخال كود الجائزة.",

"error"

);

return;

}


clearResult();


checkButton.disabled=true;

checkButton.textContent=

"جاري التحقق...";


try{


const rewardsRef=

collection(

db,

"spins"

);


const rewardQuery=

query(

rewardsRef,

where(

"rewardCode",

"==",

code

)

);


const snapshot=

await getDocs(

rewardQuery

);


if(snapshot.empty){

result.style.display="block";

result.className="invalid";

status.textContent=

"❌ الكود غير صحيح";


prizeArabic.textContent=

"لم يتم العثور على هذه الجائزة";


prizeFrench.textContent=

"Code introuvable";


displayCode.textContent=code;


confirmButton.style.display="none";


showMessage(

"هذا الكود غير موجود.",

"error"

);

return;

}


const rewardDoc=

snapshot.docs[0];


const rewardData=

rewardDoc.data();


currentDocumentId=

rewardDoc.id;


currentRewardCode=

rewardData.rewardCode;


currentPrize=

rewardData.prize;


prizeArabic.textContent=

getPrizeArabic(

rewardData.prize

);


prizeFrench.textContent=

rewardData.prize;


displayCode.textContent=

rewardData.rewardCode;


result.style.display="block";


if(

rewardData.claimed===true

){


result.className="already";


status.textContent=

"⚠️ الجائزة مستلمة من قبل";


confirmButton.style.display="none";


showMessage(

"هذا الكود تم تأكيد استلامه من قبل.",

"error"

);


}else{


result.className="valid";


status.textContent=

"✅ الجائزة صحيحة";


confirmButton.style.display="block";


showMessage(

"تم التحقق من الجائزة بنجاح.",

"success"

);

}


}catch(error){

console.error(error);


showMessage(

"Firebase Error: "+

error.message,

"error"

);

}finally{


checkButton.disabled=false;

checkButton.textContent=

"🔍 التحقق من الجائزة";

}


};


confirmButton.onclick=

async()=>{


if(

!currentDocumentId ||

!currentRewardCode

){

return;

}


confirmButton.disabled=true;

confirmButton.textContent=

"جاري تأكيد الاستلام...";


try{


const rewardRef=

doc(

db,

"spins",

currentDocumentId

);


await runTransaction(

db,

async transaction=>{


const fresh=

await transaction.get(

rewardRef

);


if(

!fresh.exists()

){

throw new Error(

"REWARD_NOT_FOUND"

);

}


const data=

fresh.data();


if(

data.claimed===true

){

throw new Error(

"ALREADY_CLAIMED"

);

}


transaction.update(

rewardRef,

{

claimed:true,

claimedAt:

serverTimestamp()

}

);

}

);


status.textContent=

"✅ تم استلام الجائزة";


confirmButton.style.display="none";


confirmedMessage.style.display="block";


result.className="valid";


showMessage(

"تم تسجيل استلام الجائزة بنجاح.",

"success"

);


}catch(error){

console.error(error);


if(

error.message==="ALREADY_CLAIMED"

){

status.textContent=

"⚠️ الجائزة مستلمة من قبل";


confirmButton.style.display="none";


result.className="already";


showMessage(

"هذه الجائزة تم استلامها من قبل.",

"error"

);

}else{


showMessage(

"وقع خطأ أثناء تأكيد الاستلام: "+

error.message,

"error"

);


confirmButton.disabled=false;


confirmButton.textContent=

"✅ تأكيد استلام الجائزة";

}

}


};


rewardCodeInput.addEventListener(

"keydown",

event=>{


if(

event.key==="Enter"

){

checkButton.click();

}

}

);


</script>


</body>

</html>
